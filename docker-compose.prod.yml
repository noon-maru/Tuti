name: tuti-prod

services:
  app:
    image: tuti:prod
    container_name: tuti-prod
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?Run with --env-file .env.production}
    env_file:
      - .env
      - .env.production
    restart: unless-stopped
    ports:
      - "5050:3000"
    depends_on:
      - db

  db:
    image: postgis/postgis:17-3.5
    container_name: tuti-prod-db
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - tuti_prod_postgres:/var/lib/postgresql/data

volumes:
  tuti_prod_postgres:
