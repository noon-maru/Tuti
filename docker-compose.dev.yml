name: tuti-dev

services:
  app:
    image: tuti:dev
    container_name: tuti-dev
    build:
      context: .
      target: dev
    env_file:
      - .env
      - .env.development
    ports:
      - "5080:3000"
    volumes:
      - .:/app
      - tuti_dev_node_modules:/app/node_modules
      - tuti_dev_pnpm_store:/pnpm/store
    depends_on:
      - db
    stdin_open: true
    tty: true

  db:
    image: postgis/postgis:17-3.5
    container_name: tuti-dev-db
    restart: unless-stopped
    ports:
      - "55432:5432"
    env_file:
      - .env.development
    volumes:
      - tuti_dev_postgres:/var/lib/postgresql/data

volumes:
  tuti_dev_node_modules:
  tuti_dev_pnpm_store:
  tuti_dev_postgres:
